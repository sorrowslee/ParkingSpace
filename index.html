<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkingSpace - 停車場視覺化與推薦系統</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js" crossorigin="anonymous"></script>

    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="停車場抽選">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <button id="menu-toggle" class="icon-btn">☰</button>
            <span class="mobile-logo">Parking<span>Space</span></span>
            <span id="mobile-filename"></span>
        </header>

        <!-- Sidebar / Tools -->
        <aside class="sidebar">
            <div class="logo">
                <h1>Parking<span>Space</span></h1>
            </div>
            
            <nav class="mode-tabs">
                <button id="btn-editor-mode" class="tab-btn active" onclick="setMode('editor')">繪圖模式</button>
                <button id="btn-lottery-mode" class="tab-btn" onclick="setMode('lottery')">抽選模式</button>
            </nav>

            <!-- Editor Tools -->
            <div id="editor-controls" class="control-group active">
                <h3>地圖物件</h3>
                <div class="tool-grid">
                    <button class="tool-btn" data-tool="slot" title="新增停車位">🅿️ 停車位</button>
                    <button class="tool-btn" data-tool="pillar" title="單個柱子 / 拖曳成牆">⬜ 柱子/牆</button>
                    <button class="tool-btn" data-tool="road" title="自由繪製道路">🛣️ 道路</button>
                    <button class="tool-btn" data-tool="elevator" title="公共電梯">🛗 電梯</button>
                    <button class="tool-btn" data-tool="elevator-home" title="住家電梯">🏠 家電梯</button>
                    <button class="tool-btn danger" data-tool="eraser" title="橡皮擦">🧹 橡皮擦</button>
                </div>

                <h3>尋找車位 (繪圖模式)</h3>
                <div class="lottery-input">
                    <input type="text" id="editor-search-input" placeholder="代號" maxlength="3">
                    <button id="btn-editor-search" class="action-btn primary">尋找</button>
                </div>

                <h3>管理</h3>
                <div class="action-grid">
                    <button id="btn-save" class="action-btn primary" title="直接存檔 (Ctrl+S)">儲存 (Save)</button>
                    <button id="btn-save-as" class="action-btn" title="另存新檔">另存新檔 (Save As)</button>
                    <button id="btn-load" class="action-btn">載入 (Open)</button>
                    <button id="btn-clear" class="action-btn danger">清空畫布</button>
                </div>
            </div>

            <!-- Lottery Controls -->
            <div id="lottery-controls" class="control-group">

                <div class="tool-grid">
                    <button id="btn-lottery-A" class="tool-btn rating-A">A級 車位</button>
                    <button id="btn-lottery-B" class="tool-btn rating-B">B級 車位</button>
                    <button id="btn-lottery-C" class="tool-btn rating-C">C級 車位</button>
                    <button id="btn-lottery-D" class="tool-btn rating-D">D級 車位</button>
                </div>
                
                <div class="action-grid" style="margin-top: 20px;">
                    <button id="btn-lottery-clear" class="action-btn danger">清空地圖高亮</button>
                </div>

                <div class="lottery-search-group" style="margin-top: 20px; display: flex; flex-direction: column; gap: 20px;">
                    <div class="search-item" style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 16px; font-weight: bold; color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);">車位抽選 (輸入號碼)</label>
                        <input type="text" id="input-lottery-select" placeholder="如 002" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; font-size: 18px; text-align: center;">
                        <button id="btn-lottery-id-select" class="action-btn primary" style="width: 100%; padding: 12px; font-size: 16px;">確認抽選</button>
                    </div>
                </div>

                <div class="action-grid" style="margin-top: 30px;">
                    <button id="btn-lottery-home" class="action-btn primary" style="background: #22c55e; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);">回到家電梯</button>
                </div>

            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="canvas-container" id="canvas-container">
            <canvas id="parking-canvas"></canvas>
            
            <!-- Floating Zoom Controls -->
            <div class="zoom-controls">
                <button id="zoom-in">+</button>
                <button id="zoom-out">-</button>
                <button id="zoom-reset">100%</button>
            </div>

            <!-- Status Indicator -->
            <div class="status-bar">
                <span id="coord-display">X: 0, Y: 0</span>
                <span id="mode-display">Mode: Editor</span>
            </div>
        </main>

        <!-- Modal for Slot Detail -->
        <div id="slot-modal" class="modal">
            <div class="modal-content">
                <h2>車位屬性設定</h2>
                <div class="form-item">
                    <label>車位號碼</label>
                    <input type="text" id="modal-slot-id" placeholder="000" maxlength="3">
                </div>
                <div class="form-item">
                    <label>車位評價</label>
                    <select id="modal-slot-rating">
                        <option value="A">A - 極佳 (近電梯、大空間)</option>
                        <option value="B">B - 優良 (好停)</option>
                        <option value="C">C - 普通</option>
                        <option value="D">D - 較差 (偏遠、有障礙)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button id="btn-modal-cancel" class="action-btn">取消</button>
                    <button id="btn-modal-save" class="action-btn primary">確定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="parking-engine.js"></script>
    <script src="lottery-logic.js"></script>
    <script src="app.js"></script>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] Service Worker Registered', reg))
                    .catch(err => console.error('[PWA] Service Worker Failed', err));
            });
        }
    </script>
</body>
</html>
